<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parvassive AI | Commander Stable</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0d1117; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .bar { width: 70%; height: 6px; background: #333; border-radius: 10px; margin-top: 15px; overflow: hidden; }
        #fill { height: 100%; width: 0%; background: var(--neon); box-shadow: 0 0 10px var(--neon); transition: 0.3s; }
        header { padding: 15px; background: var(--card); border-bottom: 2px solid var(--neon); text-align: center; font-weight: bold; letter-spacing: 2px; }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 12px; max-width: 85%; font-size: 15px; animation: slide 0.2s ease; }
        @keyframes slide { from { opacity: 0; transform: translateY(5px); } }
        .user { align-self: flex-end; background: var(--neon); color: black; font-weight: bold; }
        .ai { align-self: flex-start; background: #21262d; border: 1px solid #333; }
        .input-box { padding: 15px; background: var(--card); display: flex; gap: 10px; }
        input { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; outline: none; }
        button { background: var(--neon); color: black; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loader">
        <h2 style="color: var(--neon)">⚡ BOOTING 32-BIT ENGINE</h2>
        <p id="st">Calibrating Adreno GPU...</p>
        <div class="bar"><div id="fill"></div></div>
    </div>
    <header>PARVASSIVE COMMANDER</header>
    <div id="chat"></div>
    <div class="input-box">
        <input type="text" id="in" placeholder="Ask your Commander..." autocomplete="off">
        <button id="btn">SEND</button>
    </div>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";
        // The 32-bit "No-Crash" Model
        const modelId = "SmolLM2-135M-Instruct-q4f32_1-MLC";
        let engine;
        const log = document.getElementById("chat");
        const bar = document.getElementById("fill");
        const status = document.getElementById("st");

        async function init() {
            try {
                engine = await webllm.CreateMLCEngine(modelId, {
                    initProgressCallback: (p) => {
                        bar.style.width = (p.progress * 100) + "%";
                        status.innerText = p.text;
                    }
                });
                document.getElementById("loader").style.display = "none";
                addMsg("ai", "Commander is 32-bit Optimized. Ready for deployment!");
            } catch (e) {
                status.innerText = "CRITICAL: GPU Refused 32-bit. Try Refreshing.";
            }
        }

        window.send = async () => {
            const input = document.getElementById("in");
            const val = input.value.trim();
            if(!val) return;
            addMsg("user", val);
            input.value = "";
            const aiBubble = addMsg("ai", "...");
            const reply = await engine.chat.completions.create({
                messages: [{role: "system", content: "You are the Parvassive Playz AI Commander. High energy, gaming slang, GG!"}, {role: "user", content: val}],
                stream: true
            });
            let full = "";
            for await (const chunk of reply) {
                full += chunk.choices[0].delta.content || "";
                aiBubble.innerText = full;
                log.scrollTop = log.scrollHeight;
            }
        };

        function addMsg(role, text) {
            const d = document.createElement("div");
            d.className = `msg ${role}`;
            d.innerText = text;
            log.appendChild(d);
            log.scrollTop = log.scrollHeight;
            return d;
        }

        document.getElementById("btn").onclick = window.send;
        window.onload = init;
    </script>
</body>
</html>
