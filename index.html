<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parvassive AI | Pro Commander</title>
    <style>
        :root { --neon: #00ffcc; --bg: #0d1117; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 15px; background: var(--card); border-bottom: 2px solid var(--neon); text-align: center; font-weight: bold; letter-spacing: 2px; box-shadow: 0 0 15px var(--neon); }
        #chat { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; font-size: 15px; line-height: 1.5; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: var(--neon); color: black; font-weight: bold; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #21262d; border: 1px solid #333; border-bottom-left-radius: 2px; }
        .input-area { padding: 15px; background: var(--card); display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; outline: none; }
        button { background: var(--neon); color: black; border: none; padding: 0 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <header>PARVASSIVE COMMANDER PRO</header>
    <div id="chat">
        <div class="msg ai">Commander Online. Standing by for orders, Soldier! (Powered by Gemini Pro)</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-in" placeholder="Ask your Commander...">
        <button onclick="send()">SEND</button>
    </div>

    <script>
        // PASTE YOUR API KEY BELOW
        const API_KEY = "AIzaSyDLstJVUrNkHG9ooWtdIQF1TkaNd814Vdw"; 
        const log = document.getElementById("chat");

        async function send() {
            const input = document.getElementById("user-in");
            const text = input.value.trim();
            if (!text) return;

            addMsg("user", text);
            input.value = "";
            const aiBubble = addMsg("ai", "Typing...");

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `You are the Parvassive Playz AI Commander. High energy, gaming slang, expert in Mobile Legends. Be brief and GG. Question: ${text}` }] }]
                    })
                });

                const data = await response.json();
                aiBubble.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                aiBubble.innerText = "Error: Connection lost. Check API Key.";
            }
            log.scrollTop = log.scrollHeight;
        }

        function addMsg(role, text) {
            const div = document.createElement("div");
            div.className = `msg ${role}`;
            div.innerText = text;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
